
trigger: none

pool:
  default

variables:
- name: WRKDIR
   value:'$(System.DefaultWorkingDirectory)/environment/dev'

stages:
  - stage: CI
    jobs:
      - job: Terraforminit
        steps:
          - task: TerraformTask@5
            inputs:
              provider: 'azurerm'
              command: 'init'
              workingDirectory: '$(WRKDIR)'
              backendServiceArm: 'Newconnection'
              backendAzureRmOverrideSubscriptionID: 'f9fb190e-2a79-4b5f-b614-0f469a025fb0'
              backendAzureRmResourceGroupName: 'gonu'
              backendAzureRmStorageAccountName: 'gonustore'
              backendAzureRmContainerName: 'gonustorecontainer'
              backendAzureRmKey: 'develpment.terraform.tfstate'

          - task: TerraformTask@5
            inputs:
              provider: 'azurerm'
              command: 'plan'
              workingDirectory: '$(WRKDIR)'
              environmentServiceNameAzureRM: 'Newconnection'
      - job: test
        steps:
          - task: PowerShell@2
            displayName: checkov
            continueOnError: true
            inputs:
              filePath: 'checkov -d "$(System.DefaultWorkingDirectory)" -o junitxml > checkovres.xml'
          - task: PublishTestResults@2
            displayName: test result
            inputs:
              testResultsFormat: 'JUnit'
              testResultsFiles: 'checkovres.xml'